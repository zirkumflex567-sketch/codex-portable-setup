model = "gpt-5.4"
model_reasoning_effort = "medium"

[features]
rmcp_client = true

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.notebooklm]
command = "npx"
args = ["-y", "notebooklm-mcp@latest"]

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

